name: cheonjiyeon_app
description: Cheonjiyeon Lotus Shrine mobile app
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  google_fonts: ^5.1.0
  permission_handler: ^11.3.0
  connectivity_plus: ^6.0.3
  uuid: ^4.2.1
  path_provider: ^2.1.2
  open_filex: ^4.4.0
  url_launcher: ^6.2.4
  firebase_core: ^2.17.0
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^17.0.0
  kakao_flutter_sdk_user: ^1.9.1
  flutter_naver_login: ^1.8.0

flutter:
  uses-material-design: true
dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

flutter_launcher_icons:
  android: true
  ios: true
  # Replace with actual icon path when designer provides the asset:
  # image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0f0d0a"
  # adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  min_sdk_android: 21
